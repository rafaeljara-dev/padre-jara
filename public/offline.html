<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sin conexion - Padre Jara</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      border-radius: 1rem;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin-bottom: 1rem;
      color: #94a3b8;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      color: #64748b;
      line-height: 1.6;
      max-width: 320px;
    }
    .buttons {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }
    .btn {
      padding: 0.875rem 1.75rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      min-height: 48px;
    }
    .btn-back {
      background: white;
      color: #1e293b;
      border: 1px solid #e2e8f0;
    }
    .btn-back:active { background: #f1f5f9; }
    .btn-retry {
      background: #2563eb;
      color: white;
    }
    .btn-retry:active { background: #1d4ed8; }
    .hint {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      background: white;
      border-radius: 0.75rem;
      border-left: 3px solid #2563eb;
      text-align: left;
      max-width: 340px;
    }
    .hint p { font-size: 0.9rem; color: #475569; }
    .hint strong { color: #1e293b; }
  </style>
</head>
<body>
  <img src="/icons/web-app-manifest-192x192.png" alt="Padre Jara" class="logo" onerror="this.style.display='none'">
  <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
    <path stroke-linecap="round" stroke-linejoin="round" d="m3 3 18 18M10.5 5.5a15.585 15.585 0 0 1 3 0m-6.7 2.7a12.522 12.522 0 0 1 10.4 0M7.5 11.5a9.458 9.458 0 0 1 9 0m-6.7 2.7a6.393 6.393 0 0 1 4.4 0M12 18h.01" />
  </svg>
  <h1>Sin conexion</h1>
  <p>No hay internet. Las paginas que ya visitaste siguen disponibles.</p>
  <div class="buttons">
    <button class="btn btn-back" onclick="history.back()">Volver</button>
    <button class="btn btn-retry" onclick="location.reload()">Reintentar</button>
  </div>
  <div class="hint">
    <p><strong>Tip:</strong> Abre las paginas que necesitas mientras tengas internet. Se guardan automaticamente para funcionar sin conexion.</p>
  </div>
</body>
</html>
